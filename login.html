<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <meta name="author" content="Un Owen" />
        <meta
            name="description"
            content="The login page for the website"
        />
        <title>Outfit Picker Login</title>
    </head>
    <body>
        <header>
            <h1>Outfit Picker</h1>
            <button>Login</button>
            <button>Theme</button>
        </header>
        <form>
            <h2>Login</h2>
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required />
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required />
            <button>Login</button>
        </form>
    </body>
</html>
