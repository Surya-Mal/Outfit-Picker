<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <meta name="author" content="Un Owen" />
        <meta
            name="description"
            content="The wardrobe of the logged in user"
        />
        <title>Outfit Picker Wardrobe</title>
    </head>
    <body>
        <header>
            <h1>Outfit Picker</h1>
            <button>Login</button>
            <button>Theme</button>
        </header>
        <nav>
            <ul>
                <a href="index.html"><li>Pick Outfit</li></a>
            </ul>
        </nav>
        <main>
            <!--This will house all the clothes the user has, and contents should be added here dynamically not staticlly -->
        </main>
        <aside>
            <!-- This is to be used for filters, adding an item, and removing items -->
            <form>
                <h3>Filter</h3>
                <label>Tops</label>
                <input type="checkbox" name="filter_tops" id="filter_tops">
                <label>Bottoms</label>
                <input type="checkbox" name="filter_bottoms" id="filter_bottoms">
                <label>Shoes</label>
                <input type="checkbox" name="filter_shoes" id="filter_shoes">
            </form>

            <button>Add Items</button>
            <button>Remove Items</button>
        </aside>
    </body>
</html>
